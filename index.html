<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #fdfbf7;
            margin: 0; padding: 60px 20px;
            overflow-x: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* 1. Yaprak Katmanı: Tüm kutuların arkasında (z-index: 1) */
        .leaf-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* 2. İçerik Katmanı: Yaprakların üzerinde (z-index: 2) */
        .content-layer { position: relative; z-index: 2; max-width: 900px; margin: auto; }

        .experience-card {
            border: 3px solid #d4af37;
            padding: 40px; margin-bottom: 40px;
            /* ÖNEMLİ: Arka planı düz renk (opak) yapıyoruz ki yaprakları maskelesin */
            background-color: #fdfbf7; 
            border-radius: 20px;
            position: relative;
        }

        .maple-leaf {
            position: absolute; color: #d4af37; font-size: 50px;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div class="leaf-layer" id="leaf-layer"></div>

    <div class="content-layer">
        <!-- Buraya kartlarını ekle -->
        <div class="experience-card">
            <h3>Yurtdışı Proje Koordinatörü (2024 - 2026)</h3>
            <p>...</p>
        </div>
        <!-- Diğer kartlar -->
    </div>

    <script>
        function createMapleLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'maple-leaf';
            leaf.innerHTML = '🍁';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 8 + 8 + 's';
            document.getElementById('leaf-layer').appendChild(leaf);
            setTimeout(() => leaf.remove(), 16000);
        }
        setInterval(createMapleLeaf, 800);
    </script>
</body>
</html>
