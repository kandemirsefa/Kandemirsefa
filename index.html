<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sefa Kandemir | Hoş Geldiniz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #24292e; margin-bottom: 15px; }
        h1 { margin: 10px 0; color: #24292e; font-size: 1.5em; }
        p { color: #555; font-size: 0.95em; line-height: 1.5; }
        .badges { margin-top: 15px; }
        .badge { background: #24292e; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75em; margin: 2px; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <img src="IMG.jpeg.jpg" alt="Sefa Kandemir" class="profile-img">
        <h1>Sefa Kandemir</h1>
        <p>Hava Kuvvetleri disipliniyle operasyon ve lojistik süreçlerinde fark yaratan çözümler geliştiriyorum.</p>
        <div class="badges">
            <span class="badge">Arapça: İleri</span>
            <span class="badge">İngilizce: Orta</span>
            <span class="badge">Saha Operasyonları</span>
        </div>
    </div>
</body>
</html>
