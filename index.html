<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEFA KANDEMİR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 80px 40px;
        }

        .container { max-width: 800px; }

        /* Animasyonlu Sınıf */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 80px;
            font-weight: 700;
            line-height: 0.9;
            margin-bottom: 60px;
            letter-spacing: -2px;
            animation-delay: 0.2s; /* Hafif gecikme ile giriş */
        }

        .content-block { margin-bottom: 60px; animation-delay: 0.4s; }
        
        h2 { font-size: 14px; text-transform: uppercase; color: #666; margin-bottom: 20px; letter-spacing: 2px; }

        p { font-size: 24px; max-width: 600px; line-height: 1.4; color: #ccc; }

        .link-btn {
            font-size: 24px; color: #fff; text-decoration: underline;
            cursor: pointer; display: block; margin-top: 40px;
            transition: color 0.3s;
        }
        .link-btn:hover { color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="fade-up">SEFA<br>KANDEMİR</h1>

        <div class="content-block fade-up">
            <h2>Hakkında</h2>
            <p>12 yılı aşkın deneyimle, uluslararası saha operasyonları ve donanım entegrasyonu süreçlerini yöneten operasyon stratejisti.</p>
        </div>

        <div class="content-block fade-up">
            <h2>Uzmanlık</h2>
            <p>Sistem mimarisi, lojistik optimizasyon, kriz yönetimi ve donanım test süreçleri.</p>
        </div>

        <div class="content-block fade-up">
            <h2>İletişim</h2>
            <a class="link-btn">CV_DOWNLOAD.PDF</a>
        </div>
    </div>

</body>
</html>
