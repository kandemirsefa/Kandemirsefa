<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SEFA KANDEMİR</title>
    <style>
        body {
            background-color: #fdfbf7;
            color: #2c2c2c;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            overflow-x: hidden;
        }

        /* Başlık Koordinasyonu */
        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .profile-img {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            margin-bottom: 20px;
        }

        h1 { font-size: 50px; margin: 0; text-transform: uppercase; letter-spacing: -1px; }

        /* ÇINAR YAPRAĞI ANİMASYONU */
        .maple-leaf {
            position: absolute;
            color: #d4af37;
            font-size: 30px;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .container { max-width: 800px; margin: auto; position: relative; z-index: 1; }
        .content-block { margin-bottom: 40px; }
        h2 { color: #b8860b; font-size: 12px; letter-spacing: 3px; }
    </style>
</head>
<body>

    <script>
        // Kanada yaprağı karakteri: 🍁
        function createMapleLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'maple-leaf';
            leaf.innerHTML = '🍁';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 5 + 7 + 's';
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 12000);
        }
        setInterval(createMapleLeaf, 1500);
    </script>

    <div class="container">
        <div class="header-section">
            <img src="IMG.jpeg.jpg" alt="Sefa Kandemir" class="profile-img">
            <h1>SEFA KANDEMİR</h1>
        </div>

        <div class="content-block">
            <h2>OPERASYON & STRATEJİ</h2>
            <p>12 yılı aşkın uluslararası deneyimle; lojistik optimizasyonu, saha operasyonları ve kriz yönetimi süreçlerine stratejik liderlik ediyorum.</p>
        </div>
        <!-- Diğer içeriklerin aynı şekilde devam eder... -->
    </div>

</body>
</html>
