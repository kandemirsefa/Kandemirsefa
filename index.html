<!DOCTYPE html>
<html lang="tr">
<head>
    <style>
        body {
            background-color: #fdfbf7;
            margin: 0; padding: 60px 20px;
            overflow-x: hidden;
            font-family: 'Playfair Display', serif;
        }

        .leaf-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .content-layer { 
            position: relative; z-index: 1; max-width: 900px; margin: auto; 
            background-color: #fdfbf7;
        }

        .experience-card, .header-section {
            background-color: #fdfbf7; 
            position: relative;
            z-index: 2;
        }

        .experience-card {
            border: 3px solid #d4af37;
            padding: 40px; margin-bottom: 40px;
            border-radius: 20px;
        }

        .maple-leaf {
            position: absolute; color: #d4af37; font-size: 50px;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="leaf-layer" id="leaf-layer"></div>

    <div class="content-layer">
        <div class="header-section">
            <img src="IMG.jpeg.jpg" class="profile-img">
            <h1>SEFA KANDEMİR</h1>
        </div>

        <div class="experience-card">
            <h3>Yurtdışı Proje Koordinatörü (2024 - 2026)</h3>
            <p>Prefabrik yapı, uçak konseptli işletmeler ve aqua park projelerinde uçtan uca saha yönetimi; bütçe optimizasyonu, malzeme tedariki ve operasyonel koordinasyon[span_0](start_span)[span_0](end_span).</p>
        </div>
        <!-- Diğer kartlar aynı yapıda devam edebilir -->
    </div>

    <script>
        function createMapleLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'maple-leaf';
            leaf.innerHTML = '🍁';
            leaf.style.left = Math.random() * 100 + 'vw';
            // Hız: Süreyi 15-20 saniyeye çıkararak çok daha yavaş süzülmelerini sağladım[span_1](start_span)[span_1](end_span)
            leaf.style.animationDuration = Math.random() * 5 + 15 + 's';
            document.getElementById('leaf-layer').appendChild(leaf);
            setTimeout(() => leaf.remove(), 25000);
        }
        // Sıklık: Süreyi 4000ms yaparak yaprakların çok daha seyrek düşmesini sağladım[span_2](start_span)[span_2](end_span)
        setInterval(createMapleLeaf, 4000);
    </script>
</body>
</html>
